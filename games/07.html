<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>War the Knights</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* ગેમ ફ્રેમ */
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ઊભી સ્ક્રીન માટેનું ઓવરલે - કોઈપણ લખાણ વગર */
        .rotate-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #464646; /* તમારી ઇમેજ મુજબનો ગ્રે બેકગ્રાઉન્ડ કલર */
            z-index: 99999;
            justify-content: center;
            align-items: center;
        }

        /* રોટેટ આઇકોન સાઇઝ */
        .rotate-overlay svg {
            width: 180px;
            height: 180px;
        }

        /* જ્યારે ફોન ઊભો હોય ત્યારે જ આ સ્ક્રીન દેખાશે */
        @media screen and (orientation: portrait) {
            .rotate-overlay {
                display: flex;
            }
            .game-frame {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ઊભા મોબાઈલમાં દેખાતો સિમ્બોલ (બેકગ્રાઉન્ડ અને આઇકોન બંને કલર સેમ ઇમેજ જેવા) -->
    <div class="rotate-overlay">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- ઊભો ફોન -->
            <rect x="15" y="20" width="22" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
            <!-- આડો ફોન -->
            <rect x="42" y="42" width="44" height="22" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
            <!-- એરો (તીર) -->
            <path d="M 47 25 L 58 25 L 58 35 M 58 35 L 55 31 M 58 35 L 61 31" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- રિયલ ગેમ ફ્રેમ -->
    <iframe 
        class="game-frame" 
        src="https://play.gamepix.com/war-the-knights/embed?sid=11MG7" 
        allow="autoplay; fullscreen; keyboard"
        scrolling="no">
    </iframe>

</body>
</html>
